<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chachos League ALL STARS — Catálogo T6</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05080d;--bg2:#080d14;--surface:#0c1520;--surface2:#111e2e;--surface3:#16253a;
  --border:#1a2d42;--border2:#243d57;
  --accent:#00d4ff;--orange:#ff6b00;--gold:#ffc200;
  --green:#00ff88;--red:#ff2d55;--text:#d4e8f5;--muted:#4a6a82;
  --gk:#9333ea;--def:#2563eb;--mid:#059669;--fwd:#dc2626;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

header{background:rgba(8,13,20,0.98);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);}
.header-inner{max-width:1400px;margin:0 auto;height:60px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.logo{display:flex;flex-direction:column;line-height:1.1;}
.logo-main{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;letter-spacing:4px;color:var(--accent);text-shadow:0 0 20px rgba(0,212,255,0.3);}
.logo-main span{color:var(--orange);}
.logo-sub{font-family:'Oswald',sans-serif;font-size:10px;font-weight:300;letter-spacing:3px;color:var(--muted);}
.header-count{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap;}
.search-bar{flex:1;max-width:280px;position:relative;}
.search-bar input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;padding:7px 12px 7px 34px;border-radius:4px;outline:none;transition:border-color 0.2s;}
.search-bar input:focus{border-color:var(--accent);}
.search-bar input::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;}

/* RULES BANNER */
.rules-banner{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;}
.rules-inner{max-width:1400px;margin:0 auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.rules-title{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-right:6px;white-space:nowrap;}
.rule-chip{display:flex;align-items:center;gap:5px;padding:4px 12px;border-radius:3px;font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;border:1px solid;}
.rule-chip.gk{background:rgba(147,51,234,0.15);border-color:rgba(147,51,234,0.4);color:#c084fc;}
.rule-chip.def{background:rgba(37,99,235,0.15);border-color:rgba(37,99,235,0.4);color:#60a5fa;}
.rule-chip.mid{background:rgba(5,150,105,0.15);border-color:rgba(5,150,105,0.4);color:#34d399;}
.rule-chip.fwd{background:rgba(220,38,38,0.15);border-color:rgba(220,38,38,0.4);color:#f87171;}
.rule-chip.spe{background:rgba(217,119,6,0.15);border-color:rgba(217,119,6,0.4);color:#fbbf24;}
.rule-num{font-size:18px;font-weight:700;line-height:1;}

.tabs-wrap{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:60px;z-index:99;}
.tabs{max-width:1400px;margin:0 auto;display:flex;overflow-x:auto;}
.tab{padding:13px 20px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;white-space:nowrap;display:flex;align-items:center;gap:7px;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-count{font-family:'Share Tech Mono',monospace;font-size:10px;background:var(--surface2);padding:1px 6px;border-radius:10px;}

.pos-filters{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;}
.pos-filters-inner{max-width:1400px;margin:0 auto;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.pos-label{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-right:4px;}
.pos-btn{padding:4px 12px;background:transparent;border:1px solid var(--border2);color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:11px;border-radius:3px;cursor:pointer;transition:all 0.15s;letter-spacing:1px;}
.pos-btn:hover{border-color:var(--accent);color:var(--accent);}
.pos-btn.active{background:var(--accent);border-color:var(--accent);color:#000;}

main{max-width:1400px;margin:0 auto;padding:20px;}

.players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;transition:border-color 0.2s,transform 0.15s;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.card.GK::before{background:var(--gk);}
.card.DEF::before{background:var(--def);}
.card.MID::before{background:var(--mid);}
.card.FWD::before{background:var(--fwd);}
.card:hover{border-color:var(--border2);transform:translateY(-2px);}

.pos-badge{font-family:'Share Tech Mono',monospace;font-size:10px;padding:2px 8px;border-radius:2px;letter-spacing:1px;font-weight:700;display:inline-block;margin-bottom:8px;}
.GK .pos-badge{background:rgba(147,51,234,0.25);color:#c084fc;border:1px solid rgba(147,51,234,0.4);}
.DEF .pos-badge{background:rgba(37,99,235,0.25);color:#60a5fa;border:1px solid rgba(37,99,235,0.4);}
.MID .pos-badge{background:rgba(5,150,105,0.25);color:#34d399;border:1px solid rgba(5,150,105,0.4);}
.FWD .pos-badge{background:rgba(220,38,38,0.25);color:#f87171;border:1px solid rgba(220,38,38,0.4);}

.card-name{font-family:'Oswald',sans-serif;font-size:17px;font-weight:600;letter-spacing:1px;color:#fff;line-height:1.1;margin-bottom:6px;}
.card-nat{font-size:13px;font-weight:600;margin-bottom:8px;letter-spacing:0.5px;}
.card-divider{height:1px;background:var(--border);margin:8px 0;}
.card-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.stat{display:flex;flex-direction:column;gap:1px;}
.stat-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.stat-value{font-family:'Oswald',sans-serif;font-size:14px;font-weight:500;color:var(--text);}
.card-team{margin-top:8px;padding-top:7px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);display:flex;align-items:flex-start;gap:5px;line-height:1.3;}
.team-icon{color:var(--orange);font-size:11px;flex-shrink:0;margin-top:1px;}
.card-status{margin-top:5px;font-family:'Share Tech Mono',monospace;font-size:10px;}
.status-active{color:var(--green);}
.status-retired{color:var(--muted);}

.no-results{text-align:center;padding:60px 20px;color:var(--muted);font-family:'Oswald',sans-serif;font-size:16px;letter-spacing:2px;text-transform:uppercase;grid-column:1/-1;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.tabs::-webkit-scrollbar{height:3px;}

@media(max-width:600px){
  .players-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;}
  .card{padding:11px;}
  .card-name{font-size:15px;}
  .header-count{display:none;}
  .rule-chip{font-size:12px;padding:3px 8px;}
  .rules-title{display:none;}
}
@media(max-width:400px){
  .players-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>

<header>
  <div class="header-inner">

<div class="pos-filters">

</div>

<main>
  <div class="players-grid" id="playersGrid"></div>
</main>

const POS_BY_CAT={ALL:[],GK:['PO'],DEF:['DFC','DFI','DFD'],MID:['MCO','MC','MI','MD','MCD'],FWD:['EI','ED','DC']};
let currentTab='ALL', currentPos='';

function setTab(tab,btn){
  currentTab=tab;currentPos='';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderPosFilters();applyFilters();
}

function renderPosFilters(){
  const inner=document.getElementById('posFilterInner');
  const positions=POS_BY_CAT[currentTab];
  if(!positions||positions.length<=1){inner.innerHTML='<span class="pos-label" style="color:var(--muted2)">Todas las posiciones</span>';return;}
  inner.innerHTML=`<span class="pos-label">Pos:</span>
    <button class="pos-btn ${currentPos===''?'active':''}" onclick="setPos('',this)">Todos</button>
    ${positions.map(p=>`<button class="pos-btn ${currentPos===p?'active':''}" onclick="setPos('${p}',this)">${p}</button>`).join('')}`;
}

function setPos(pos,btn){
  currentPos=pos;
  document.querySelectorAll('.pos-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function getNatColor(nat){
  if(!nat)return'var(--muted)';
  if(NAT_COLORS[nat])return NAT_COLORS[nat];
  for(const[key,color]of Object.entries(NAT_COLORS)){if(nat.includes(key)||key.includes(nat))return color;}
  return'var(--muted)';
}

function applyFilters(){
  const search=document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered=PLAYERS;
  if(currentTab!=='ALL')filtered=filtered.filter(p=>p.cat===currentTab);
  if(currentPos)filtered=filtered.filter(p=>p.pos===currentPos);
  if(search)filtered=filtered.filter(p=>p.name.toLowerCase().includes(search)||p.nat.toLowerCase().includes(search)||p.team.toLowerCase().includes(search));
  document.getElementById('countDisplay').textContent=filtered.length+' jugadores';
  renderGrid(filtered);
}

function renderGrid(players){
  const grid=document.getElementById('playersGrid');
  if(!players.length){grid.innerHTML='<div class="no-results">Sin jugadores encontrados</div>';return;}
  const sorted=[...players].sort((a,b)=>a.name.localeCompare(b.name));
  grid.innerHTML=sorted.map(p=>{
    const natColor=getNatColor(p.nat);
    const isActive=p.status==='Activo';
    const statusHtml=isActive
      ?'<div class="card-status status-active">● Activo</div>'
      :`<div class="card-status status-retired">Retirado ${p.status}</div>`;
    return`<div class="card ${p.cat}">
      <span class="pos-badge">${p.pos}</span>
      <div class="card-name">${p.name}</div>
      <div class="card-nat" style="color:${natColor}">${p.nat}</div>
      <div class="card-divider"></div>
      <div class="card-stats">
        <div class="stat"><span class="stat-label">Altura</span><span class="stat-value">${p.height>0?p.height.toFixed(2)+' m':'—'}</span></div>
        <div class="stat"><span class="stat-label">Peso</span><span class="stat-value">${p.weight>0?p.weight+' kg':'—'}</span></div>
      </div>
      <div class="card-team"><span class="team-icon">🏆</span><span>${p.team}</span></div>
      ${statusHtml}
    </div>`;
  }).join('');
}

renderPosFilters();
applyFilters();
</script>
</body>
</html>
